name: Server Build & Tests (Linux)

on:
  push:
    branches: [ 'main' ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly canary against framework develop to catch API drift early;
    # push/PR builds stay pinned to FRAMEWORK_REF below.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # The mod cannot build standalone: CI checks out the MafiaHub Framework and
  # nests this repository inside code/projects/. Pinned to the framework
  # commit this code was ported against; scheduled runs
  # track develop instead to surface upstream API drift.
  FRAMEWORK_REF: ${{ github.event_name == 'schedule' && 'develop' || '494316d2638dc8aa194691bd771fdf6bab942484' }}

jobs:
  build-test:
    name: Linux server build & tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout MafiaHub Framework
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MafiaHub/Framework
          ref: ${{ env.FRAMEWORK_REF }}
          # The private services-adapter submodule is not fetched; the build
          # falls back to the public prebuilt MafiaHubServices release. The
          # framework's CMake (code/framework/src/services/CMakeLists.txt)
          # downloads mafiahub-services-ubuntu-latest.zip from the rolling
          # https://github.com/MafiaHub/Framework/releases/tag/MafiaHub-Services
          # release; it publishes no checksum, so integrity currently rests on
          # that release tag. Pin/verify here if upstream starts shipping one.
          submodules: false

      - name: Checkout mod into the framework
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: code/projects/mod

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential ccache \
            libcurl4-openssl-dev libssl-dev zlib1g-dev libssh2-1-dev

      - name: Set up CMake
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
        with:
          cmakeVersion: "~3.31.0"

      - name: Restore compiler cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ccache
          # Keyed on the commit so re-runs reuse the same entry instead of
          # churning the cache quota; restore-keys picks up the most recent
          # prior build for incremental compilation.
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build server
        run: cmake --build build --target HogwartsMPServer

      - name: Build and run tests
        run: cmake --build build --target RunHogwartsMPTests

  typecheck:
    name: Scripting type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Only the mod is needed (no framework, no C++ build): type-check the JS scripting resources
      # against the .d.ts API defs. Catches API drift between the builtins and the type definitions.
      - name: Checkout mod
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node is preinstalled on ubuntu-latest; install the pinned TypeScript compiler.
      - name: Install TypeScript
        run: npm install -g typescript@5

      - name: Type-check scripting resources (server + client)
        run: |
          tsc -p resources/gamemode/server
          tsc -p resources/gamemode/client
